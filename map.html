<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lac d’Annecy — Activity map</title>
  <meta
    name="description"
    content="Map of Lac d’Annecy: towns, swims, rides, food, views, day trips, water and culture in Haute-Savoie."
  />
  <meta property="og:title" content="Lac d’Annecy — Activity map" />
  <meta
    property="og:description"
    content="Every spot we mention, on one map: towns, swims, rides, dinners, viewpoints."
  />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="assets/orientation/orientation_relief.jpg" />
  <meta name="theme-color" content="#0B1F33" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..800;1,9..144,400..800&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    :root {
      --font-display: 'Fraunces', Georgia, serif;
      --font-body: 'Inter', system-ui, -apple-system, Arial, sans-serif;

      --text-xs: clamp(0.72rem, 0.68rem + 0.2vw, 0.82rem);
      --text-sm: clamp(0.86rem, 0.82rem + 0.25vw, 0.96rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.08rem);
      --text-md: clamp(1.08rem, 1rem + 0.4vw, 1.22rem);
      --text-lg: clamp(1.25rem, 1.1rem + 0.7vw, 1.55rem);
      --text-xl: clamp(1.7rem, 1.3rem + 1.6vw, 2.6rem);

      --bg: #f4faff;
      --bg-deep: #eaf3fa;
      --surface: #ffffff;
      --surface-2: #e7f1f8;
      --surface-3: #d8e7f0;
      --ink: #0b1f33;
      --ink-2: #142e47;
      --muted: #4c6475;
      --faint: #88a0b1;
      --aqua: #36b9cc;
      --aqua-bright: #4fd1de;
      --aqua-deep: #18879a;
      --alpine: #1f7fb3;
      --alpine-deep: #114b73;
      --pine: #2f6b4f;
      --glacier: #cfe5f0;
      --mist: #dde9f1;
      --border: #c9dce7;
      --border-strong: #9ec0d3;

      /* Category colors */
      --cat-town: #1f7fb3;
      --cat-swim: #36b9cc;
      --cat-bike: #2f6b4f;
      --cat-food: #b35a1f;
      --cat-view: #6b4fa0;
      --cat-trip: #114b73;
      --cat-water: #0e6e8a;
      --cat-culture: #8a1f5a;

      --shadow-sm: 0 2px 6px rgba(11, 31, 51, 0.07);
      --shadow-md: 0 16px 36px rgba(11, 31, 51, 0.10);
      --shadow-lg: 0 30px 70px rgba(11, 31, 51, 0.18);

      --radius-sm: 0.5rem;
      --radius-md: 0.85rem;
      --radius-lg: 1.15rem;
      --radius-xl: 1.6rem;

      --content: 1180px;
      --content-wide: 1340px;
      --transition: 220ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body {
      min-height: 100dvh;
      font-family: var(--font-body);
      font-size: var(--text-base);
      line-height: 1.55;
      color: var(--ink);
      background: var(--bg);
    }

    img, svg, iframe { display: block; max-width: 100%; }
    img { height: auto; background: var(--mist); }

    a {
      color: var(--alpine);
      text-decoration-thickness: 0.07em;
      text-underline-offset: 0.18em;
      transition: color var(--transition);
    }
    a:hover { color: var(--alpine-deep); }

    button { font: inherit; color: inherit; cursor: pointer; border: 0; background: transparent; }

    :focus-visible {
      outline: 2px solid var(--aqua);
      outline-offset: 2px;
      border-radius: var(--radius-sm);
    }

    .skip-link {
      position: absolute; left: 1rem; top: 1rem;
      transform: translateY(-150%);
      background: var(--surface); color: var(--ink);
      padding: 0.5rem 0.85rem; border-radius: var(--radius-sm);
      box-shadow: var(--shadow-md); z-index: 1000;
    }
    .skip-link:focus { transform: translateY(0); }

    /* ----- header ----- */
    .site-header {
      position: sticky; top: 0; z-index: 500;
      backdrop-filter: blur(12px);
      background: rgba(244, 250, 255, 0.85);
      border-bottom: 1px solid var(--border);
    }
    .nav {
      max-width: var(--content-wide);
      margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.75rem 1.25rem;
      gap: 1rem;
    }
    .brand {
      display: inline-flex; align-items: center; gap: 0.55rem;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 1.05rem;
      letter-spacing: 0.01em;
      color: var(--ink);
      text-decoration: none;
    }
    .brand .dot {
      width: 0.55rem; height: 0.55rem; border-radius: 50%;
      background: linear-gradient(135deg, var(--aqua), var(--alpine));
      box-shadow: 0 0 0 4px rgba(54, 185, 204, 0.18);
    }
    .nav-links {
      display: flex; gap: 0.25rem; flex-wrap: wrap;
    }
    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.92rem;
      padding: 0.45rem 0.7rem;
      border-radius: var(--radius-sm);
    }
    .nav-links a:hover { color: var(--ink); background: var(--surface-2); }
    .nav-links a.is-current {
      color: var(--ink);
      background: var(--surface-2);
    }
    @media (max-width: 720px) {
      .nav-links { display: none; }
    }

    /* ----- page intro ----- */
    .page-intro {
      max-width: var(--content-wide);
      margin: 0 auto;
      padding: 1.25rem 1.25rem 0.5rem;
      display: flex; flex-wrap: wrap; align-items: end; justify-content: space-between;
      gap: 0.75rem 1.5rem;
    }
    .page-intro .eyebrow {
      display: inline-flex; align-items: center; gap: 0.55rem;
      font-size: 0.74rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--alpine-deep);
      background: var(--surface-2);
      padding: 0.35rem 0.65rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      margin-bottom: 0.55rem;
    }
    .page-intro .eyebrow::before {
      content: ""; width: 6px; height: 6px; border-radius: 50%;
      background: var(--aqua);
    }
    .page-intro h1 {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: var(--text-xl);
      letter-spacing: -0.02em;
      line-height: 1.05;
      color: var(--ink);
    }
    .page-intro p {
      color: var(--muted);
      font-size: 0.95rem;
      max-width: 56ch;
      margin-top: 0.4rem;
    }

    /* ----- map shell ----- */
    .map-shell {
      max-width: var(--content-wide);
      margin: 1rem auto 2rem;
      padding: 0 1.25rem;
    }
    .filters {
      display: flex; flex-wrap: wrap; gap: 0.4rem 0.5rem;
      margin: 0.5rem 0 1rem;
    }
    .chip {
      display: inline-flex; align-items: center; gap: 0.45rem;
      padding: 0.45rem 0.75rem;
      border-radius: 999px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--ink-2);
      font-size: 0.86rem;
      font-weight: 500;
      transition: background var(--transition), border-color var(--transition), color var(--transition), transform var(--transition);
    }
    .chip:hover { border-color: var(--border-strong); }
    .chip[aria-pressed="true"] {
      background: var(--ink);
      border-color: var(--ink);
      color: #fff;
    }
    .chip[aria-pressed="true"] .chip-dot {
      box-shadow: 0 0 0 2px rgba(255,255,255,0.35);
    }
    .chip .chip-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--cat);
      flex-shrink: 0;
    }
    .chip[data-cat="all"] .chip-dot {
      background: linear-gradient(135deg, var(--aqua), var(--alpine));
    }

    .map-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.55fr) minmax(0, 1fr);
      gap: 1rem;
      align-items: stretch;
    }
    @media (max-width: 960px) {
      .map-grid { grid-template-columns: 1fr; }
    }

    .map-stage {
      position: relative;
      min-height: 70vh;
      border-radius: var(--radius-xl);
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--surface-2);
      box-shadow: var(--shadow-md);
    }
    @media (max-width: 960px) {
      .map-stage { min-height: 55vh; }
    }
    #map {
      position: absolute; inset: 0;
    }
    .leaflet-container {
      font-family: var(--font-body);
      background: var(--surface-2);
    }

    /* Custom markers */
    .marker {
      width: 30px; height: 30px;
      border-radius: 50% 50% 50% 0;
      background: var(--cat, var(--alpine));
      transform: rotate(-45deg);
      border: 2px solid #fff;
      box-shadow: 0 4px 10px rgba(11, 31, 51, 0.25);
      display: flex; align-items: center; justify-content: center;
      transition: transform 160ms cubic-bezier(0.16, 1, 0.3, 1), box-shadow 160ms;
    }
    .marker .marker-glyph {
      transform: rotate(45deg);
      color: #fff;
      font-size: 14px;
      line-height: 1;
      font-weight: 700;
    }
    .marker:hover, .marker.is-active {
      transform: rotate(-45deg) scale(1.12);
      box-shadow: 0 6px 16px rgba(11, 31, 51, 0.3);
    }

    /* Popups */
    .leaflet-popup-content-wrapper {
      border-radius: var(--radius-md);
      padding: 0;
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border);
    }
    .leaflet-popup-content {
      margin: 0;
      width: 260px !important;
      font-family: var(--font-body);
    }
    .leaflet-popup-tip { box-shadow: var(--shadow-md); }
    .pop {
      display: flex; flex-direction: column;
    }
    .pop-photo {
      aspect-ratio: 16 / 10;
      width: 100%;
      object-fit: cover;
      background: var(--mist);
    }
    .pop-body {
      padding: 0.7rem 0.85rem 0.85rem;
      display: flex; flex-direction: column; gap: 0.4rem;
    }
    .pop-cat {
      display: inline-flex; align-items: center; gap: 0.4rem;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--cat, var(--alpine-deep));
    }
    .pop-cat .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--cat, var(--alpine));
    }
    .pop h3 {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: 1.12rem;
      line-height: 1.2;
      letter-spacing: -0.01em;
      color: var(--ink);
    }
    .pop p {
      font-size: 0.88rem;
      color: var(--ink-2);
      line-height: 1.45;
    }
    .pop-link {
      align-self: start;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--alpine);
      text-decoration: none;
      padding-top: 0.15rem;
    }
    .pop-link:hover { color: var(--alpine-deep); text-decoration: underline; }
    .pop-link::after { content: " →"; }

    /* Side list */
    .side {
      display: flex; flex-direction: column;
      gap: 0.75rem;
      max-height: 70vh;
      min-height: 0;
    }
    @media (max-width: 960px) {
      .side { max-height: none; }
    }
    .side-head {
      display: flex; align-items: baseline; justify-content: space-between;
      gap: 1rem;
    }
    .side-head h2 {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: 1.25rem;
      letter-spacing: -0.01em;
    }
    .side-count {
      font-size: 0.78rem;
      color: var(--muted);
    }
    .place-list {
      overflow-y: auto;
      flex: 1 1 auto;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--surface);
      padding: 0.4rem;
    }
    @media (max-width: 960px) {
      .place-list { max-height: 50vh; }
    }
    .group-head {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.65rem 0.5rem 0.4rem;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .group-head .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--cat);
    }
    .place-item {
      display: flex; align-items: center; gap: 0.6rem;
      width: 100%;
      text-align: left;
      padding: 0.55rem 0.6rem;
      border-radius: var(--radius-sm);
      color: var(--ink-2);
      font-size: 0.92rem;
      transition: background var(--transition), color var(--transition);
    }
    .place-item:hover { background: var(--surface-2); color: var(--ink); }
    .place-item[aria-pressed="true"] {
      background: var(--surface-3);
      color: var(--ink);
      font-weight: 600;
    }
    .place-item .pin {
      width: 14px; height: 14px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      background: var(--cat);
      flex-shrink: 0;
      border: 1.5px solid #fff;
      box-shadow: 0 1px 3px rgba(11,31,51,0.25);
    }
    .place-item.is-hidden { display: none; }
    .group-empty .group-head { opacity: 0.4; }

    /* Legend / footer */
    .footer {
      max-width: var(--content-wide);
      margin: 0 auto;
      padding: 1.25rem 1.25rem 2.5rem;
      display: flex; flex-wrap: wrap; justify-content: space-between; gap: 0.75rem;
      color: var(--muted);
      font-size: 0.85rem;
      border-top: 1px solid var(--border);
    }
    .footer em { font-family: var(--font-display); font-style: italic; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
  </style>
</head>

    /* ---------- MAP ---------- */
    const map = L.map('map', {
      scrollWheelZoom: true,
      zoomControl: true,
      worldCopyJump: false
    }).setView([45.870, 6.205], 12);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      maxZoom: 18,
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OSM</a> · © <a href="https://carto.com/attributions">CARTO</a>'
    }).addTo(map);

    /* ---------- FILTERS ---------- */
    const filtersEl = document.getElementById('filters');
    const active = new Set(CATEGORIES.map((c) => c.id));

    function makeChip(id, label, color) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'chip';
      btn.dataset.cat = id;
      btn.setAttribute('aria-pressed', 'true');
      if (color) btn.style.setProperty('--cat', color);
      btn.innerHTML = '<span class="chip-dot" aria-hidden="true"></span>' + label;
      return btn;
    }

    const allChip = makeChip('all', 'All');
    allChip.setAttribute('aria-pressed', 'true');
    filtersEl.appendChild(allChip);
    CATEGORIES.forEach((c) => filtersEl.appendChild(makeChip(c.id, c.label, c.color)));

    /* ---------- MARKERS + LIST ---------- */
    const placeListEl = document.getElementById('place-list');
    const sideCountEl = document.getElementById('side-count');
    const markers = {};
    const items = {};
    const groupEls = {};

    function escapeHTML(s) {
      return String(s).replace(/[&<>"']/g, (c) =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])
      );
    }

    function popupHTML(p) {
      const cat = CAT_BY_ID[p.cat];
      const color = cat ? cat.color : 'var(--alpine)';
      const catLabel = cat ? cat.label : p.cat;
      const photo = p.photo
        ? `<img class="pop-photo" src="${escapeHTML(p.photo)}" alt="${escapeHTML(p.name)}" loading="lazy" />`
        : '';
      const link = p.link
        ? `<a class="pop-link" href="${escapeHTML(p.link)}">Open in the notes</a>`
        : '';
      return `
        <div class="pop" style="--cat:${color}">
          ${photo}
          <div class="pop-body">
            <span class="pop-cat"><span class="dot"></span>${escapeHTML(catLabel)}</span>
            <h3>${escapeHTML(p.name)}</h3>
            <p>${escapeHTML(p.blurb)}</p>
            ${link}
          </div>
        </div>
      `;
    }

    function makeMarker(p) {
      const cat = CAT_BY_ID[p.cat];
      const color = cat ? cat.color : '#1f7fb3';
      const glyph = cat ? cat.glyph : '•';
      const html = `<div class="marker" style="--cat:${color}"><span class="marker-glyph">${glyph}</span></div>`;
      const icon = L.divIcon({
        className: 'marker-wrap',
        html,
        iconSize: [30, 30],
        iconAnchor: [15, 30],
        popupAnchor: [0, -28]
      });
      const m = L.marker(p.coords, { icon, title: p.name });
      m.bindPopup(popupHTML(p), { closeButton: true, maxWidth: 280, minWidth: 240 });
      m.on('popupopen', () => setActive(p.id, false));
      return m;
    }

    function setActive(id, fly) {
      Object.entries(markers).forEach(([k, m]) => {
        const el = m.getElement && m.getElement();
        const inner = el && el.querySelector('.marker');
        if (inner) inner.classList.toggle('is-active', k === id);
      });
      Object.entries(items).forEach(([k, b]) => {
        b.setAttribute('aria-pressed', String(k === id));
      });
      if (fly) {
        const p = PLACES.find((x) => x.id === id);
        if (p) {
          map.flyTo(p.coords, Math.max(map.getZoom(), 13), { duration: 0.6 });
          markers[id] && markers[id].openPopup();
        }
      }
    }

    // Group by category for the side list
    CATEGORIES.forEach((c) => {
      const wrap = document.createElement('div');
      wrap.className = 'group';
      wrap.dataset.cat = c.id;
      const head = document.createElement('div');
      head.className = 'group-head';
      head.innerHTML = `<span class="dot" style="--cat:${c.color}"></span>${escapeHTML(c.label)}`;
      wrap.appendChild(head);
      placeListEl.appendChild(wrap);
      groupEls[c.id] = wrap;
    });

    PLACES.forEach((p) => {
      const cat = CAT_BY_ID[p.cat];
      const color = cat ? cat.color : '#1f7fb3';
      const m = makeMarker(p).addTo(map);
      markers[p.id] = m;

      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'place-item';
      btn.dataset.cat = p.cat;
      btn.dataset.id = p.id;
      btn.setAttribute('aria-pressed', 'false');
      btn.innerHTML = `<span class="pin" style="--cat:${color}" aria-hidden="true"></span><span>${escapeHTML(p.name)}</span>`;
      btn.addEventListener('click', () => setActive(p.id, true));
      const group = groupEls[p.cat];
      if (group) group.appendChild(btn);
      else placeListEl.appendChild(btn);
      items[p.id] = btn;
    });

    /* ---------- FILTER LOGIC ---------- */
    function applyFilters() {
      let visible = 0;
      PLACES.forEach((p) => {
        const on = active.has(p.cat);
        const m = markers[p.id];
        if (on) {
          if (!map.hasLayer(m)) m.addTo(map);
          visible += 1;
        } else if (map.hasLayer(m)) {
          map.removeLayer(m);
        }
        const item = items[p.id];
        if (item) item.classList.toggle('is-hidden', !on);
      });
      // Empty groups
      CATEGORIES.forEach((c) => {
        const g = groupEls[c.id];
        if (!g) return;
        g.classList.toggle('group-empty', !active.has(c.id));
      });
      sideCountEl.textContent = visible + ' / ' + PLACES.length + ' shown';
      // Sync All chip
      allChip.setAttribute('aria-pressed', String(active.size === CATEGORIES.length));
    }

    filtersEl.addEventListener('click', (e) => {
      const btn = e.target.closest('.chip');
      if (!btn) return;
      const id = btn.dataset.cat;
      if (id === 'all') {
        if (active.size === CATEGORIES.length) {
          active.clear();
        } else {
          CATEGORIES.forEach((c) => active.add(c.id));
        }
      } else {
        if (active.has(id)) active.delete(id); else active.add(id);
      }
      // Update chip pressed states (except 'all', handled in applyFilters)
      Array.from(filtersEl.querySelectorAll('.chip')).forEach((c) => {
        const cid = c.dataset.cat;
        if (cid === 'all') return;
        c.setAttribute('aria-pressed', String(active.has(cid)));
      });
      applyFilters();
    });

    applyFilters();

    // Fit to lake on load (broad bounds covering all markers)
    const bounds = L.latLngBounds(PLACES.map((p) => p.coords));
    map.fitBounds(bounds, { padding: [40, 40], maxZoom: 12 });
  </script>
